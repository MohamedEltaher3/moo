<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GradeOS — تسجيل الدخول</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
         :root {
            --bg: #0B0D12;
            --surface: #111318;
            --card: #181B22;
            --border: rgba(255, 255, 255, 0.07);
            --border-strong: rgba(255, 255, 255, 0.13);
            --primary: #6366F1;
            --primary-dim: rgba(99, 102, 241, 0.14);
            --primary-border: rgba(99, 102, 241, 0.35);
            --green: #10B981;
            --red: #EF4444;
            --red-dim: rgba(239, 68, 68, 0.12);
            --text: #E8EBF0;
            --text-muted: #6B7785;
            --text-subtle: #3D4655;
        }
        
        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        /* subtle grid pattern */
        
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(99, 102, 241, 0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(99, 102, 241, 0.04) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }
        
        .wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
        }
        /* Brand */
        
        .brand {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        
        .brand-icon {
            width: 42px;
            height: 42px;
            background: var(--primary);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .brand-name {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        /* Card */
        
        .card {
            background: var(--card);
            border: 1px solid var(--border-strong);
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.5);
        }
        
        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .card-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        /* Tab switcher */
        
        .tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
            background: var(--surface);
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 24px;
        }
        
        .tab {
            padding: 8px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            border: none;
            background: transparent;
            color: var(--text-muted);
            transition: all 0.15s;
            text-align: center;
        }
        
        .tab.active {
            background: var(--card);
            color: var(--text);
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
        }
        /* Form */
        
        .form {
            display: none;
        }
        
        .form.active {
            display: block;
        }
        
        .form-group {
            margin-bottom: 16px;
        }
        
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 7px;
        }
        
        .input-wrap {
            position: relative;
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-strong);
            border-radius: 9px;
            font-size: 14px;
            font-family: 'Cairo', sans-serif;
            color: var(--text);
            background: var(--surface);
            outline: none;
            transition: border-color 0.15s, background 0.15s;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            background: #0D1018;
        }
        
        .form-group select option {
            background: var(--surface);
        }
        /* password toggle */
        
        .eye-btn {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 2px;
            line-height: 1;
        }
        
        .eye-btn:hover {
            color: var(--text);
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        /* Submit button */
        
        .btn-submit {
            width: 100%;
            padding: 11px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: background 0.15s, opacity 0.15s;
            margin-top: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-submit:hover:not(:disabled) {
            background: #5254d4;
        }
        
        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }
        
        .btn-submit.loading .spinner {
            display: block;
        }
        
        .btn-submit.loading .btn-text {
            display: none;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        /* Error / success */
        
        .alert {
            display: none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 16px;
            align-items: center;
            gap: 8px;
        }
        
        .alert.show {
            display: flex;
        }
        
        .alert.error {
            background: var(--red-dim);
            border: 1px solid rgba(239, 68, 68, 0.25);
            color: #f87171;
        }
        
        .alert.success {
            background: rgba(16, 185, 129, 0.12);
            border: 1px solid rgba(16, 185, 129, 0.25);
            color: #34d399;
        }
        /* Divider */
        
        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 20px 0;
            color: var(--text-subtle);
            font-size: 12px;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        /* Footer note */
        
        .footer-note {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: var(--text-subtle);
        }
    </style>
</head>

<body>

    <div class="wrapper">
        <!-- Brand -->
        <div class="brand">
            <div class="brand-icon">🎓</div>
            <span class="brand-name">GradeOS</span>
        </div>

        <!-- Card -->
        <div class="card">
            <div class="card-title">مرحبًا بك</div>
            <div class="card-sub">سجّل دخولك أو أنشئ حسابًا جديدًا</div>

            <!-- Tab switcher -->
            <div class="tabs">
                <button class="tab active" id="tab-login" onclick="switchTab('login')">تسجيل الدخول</button>
                <button class="tab" id="tab-register" onclick="switchTab('register')">حساب جديد</button>
            </div>

            <!-- Alert -->
            <div class="alert" id="alert">
                <span id="alert-icon">✕</span>
                <span id="alert-msg">خطأ</span>
            </div>

            <!-- ── LOGIN FORM ── -->
            <div class="form active" id="form-login">
                <div class="form-group">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="l-email" placeholder="ahmed@example.com" autocomplete="email" />
                </div>
                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrap">
                        <input type="password" id="l-password" placeholder="••••••••" autocomplete="current-password" />
                        <button class="eye-btn" type="button" onclick="togglePass('l-password', this)">👁</button>
                    </div>
                </div>
                <button class="btn-submit" id="btn-login" onclick="doLogin()">
        <div class="spinner"></div>
        <span class="btn-text">تسجيل الدخول</span>
      </button>
            </div>

            <!-- ── REGISTER FORM ── -->
            <div class="form" id="form-register">
                <div class="form-row">
                    <div class="form-group">
                        <label>الاسم الكامل *</label>
                        <input type="text" id="r-name" placeholder="أحمد محمد" />
                    </div>
                    <div class="form-group">
                        <label>البريد الإلكتروني *</label>
                        <input type="email" id="r-email" placeholder="ahmed@example.com" />
                    </div>
                </div>
                <div class="form-group">
                    <label>كلمة المرور * (6 أحرف على الأقل)</label>
                    <div class="input-wrap">
                        <input type="password" id="r-password" placeholder="••••••••" autocomplete="new-password" />
                        <button class="eye-btn" type="button" onclick="togglePass('r-password', this)">👁</button>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>العمر *</label>
                        <input type="number" id="r-age" placeholder="21" min="16" max="60" />
                    </div>
                    <div class="form-group">
                        <label>القسم *</label>
                        <select id="r-department">
            <option value="">— اختر —</option>
            <option value="CS">CS</option>
            <option value="IT">IT</option>
            <option value="Engineering">Engineering</option>
            <option value="Business">Business</option>
            <option value="Science">Science</option>
          </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>رقم الهاتف (اختياري)</label>
                    <input type="text" id="r-phone" placeholder="+201012345678" />
                </div>
                <button class="btn-submit" id="btn-register" onclick="doRegister()">
        <div class="spinner"></div>
        <span class="btn-text">إنشاء الحساب</span>
      </button>
            </div>

            <!-- ── VERIFY FORM ── -->
            <div class="form" id="form-verify">
                <div style="text-align:center; margin-bottom:20px;">
                    <div style="font-size:40px; margin-bottom:12px;">📧</div>
                    <div style="font-size:15px; font-weight:700; margin-bottom:6px;">تحقق من بريدك الإلكتروني</div>
                    <div style="font-size:13px; color:var(--text-muted);">تم إرسال كود من 6 أرقام إلى <span id="verify-email-display" style="color:var(--primary)"></span></div>
                </div>
                <div class="form-group">
                    <label>كود التحقق</label>
                    <input type="text" id="v-code" placeholder="123456" maxlength="6" style="text-align:center; font-size:22px; letter-spacing:8px; font-weight:700;" />
                </div>
                <button class="btn-submit" id="btn-verify" onclick="doVerify()">
                    <div class="spinner"></div>
                    <span class="btn-text">تأكيد الكود</span>
                </button>
            </div>
        </div>

        <div class="footer-note">Faculty of Computers &amp; Information — Assiut University</div>
    </div>

    <script>
        const API = 'https://moo-production.up.railway.app/api';
        let pendingEmail = '';

        // redirect if already logged in
        if (localStorage.getItem('gradeos_token')) {
            window.location.href = 'index.html';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('form-' + tab).classList.add('active');
            hideAlert();
        }

        function showAlert(msg, type = 'error') {
            const el = document.getElementById('alert');
            document.getElementById('alert-icon').textContent = type === 'error' ? '✕' : '✓';
            document.getElementById('alert-msg').textContent = msg;
            el.className = 'alert show ' + type;
        }

        function hideAlert() {
            document.getElementById('alert').className = 'alert';
        }

        function setLoading(btnId, on) {
            const btn = document.getElementById(btnId);
            btn.disabled = on;
            btn.classList.toggle('loading', on);
        }

        function togglePass(inputId, btn) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
                btn.textContent = '🙈';
            } else {
                input.type = 'password';
                btn.textContent = '👁';
            }
        }

        function saveSession(token, user) {
            localStorage.setItem('gradeos_token', token);
            localStorage.setItem('gradeos_user', JSON.stringify(user));
        }

        async function doLogin() {
            hideAlert();
            const email = document.getElementById('l-email').value.trim();
            const password = document.getElementById('l-password').value;

            if (!email || !password) {
                return showAlert('يرجى إدخال البريد الإلكتروني وكلمة المرور');
            }

            setLoading('btn-login', true);
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        email,
                        password
                    }),
                });
                const data = await res.json();

                if (!res.ok) {
                    showAlert(data.message || 'بيانات الدخول غير صحيحة');
                    return;
                }

                saveSession(data.token, data.data);
                showAlert('تم تسجيل الدخول بنجاح، جاري التحويل...', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 800);
            } catch (e) {
                showAlert('تعذّر الاتصال بالسيرفر');
            } finally {
                setLoading('btn-login', false);
            }
        }

        async function doRegister() {
            hideAlert();
            const name = document.getElementById('r-name').value.trim();
            const email = document.getElementById('r-email').value.trim();
            const password = document.getElementById('r-password').value;
            const age = document.getElementById('r-age').value;
            const department = document.getElementById('r-department').value;
            const phone = document.getElementById('r-phone').value.trim();

            if (!name || !email || !password || !age || !department) {
                return showAlert('يرجى ملء جميع الحقول المطلوبة');
            }
            if (password.length < 6) {
                return showAlert('كلمة المرور يجب أن تكون 6 أحرف على الأقل');
            }

            setLoading('btn-register', true);
            try {
                const body = {
                    name,
                    email,
                    password,
                    age: Number(age),
                    department
                };
                if (phone) body.phone = phone;

                const res = await fetch(`${API}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (!res.ok) {
                    const errMsg = data.errors ?.[0] ?.message || data.message || 'فشل إنشاء الحساب';
                    showAlert(errMsg);
                    return;
                }

                // Show verification step
                pendingEmail = email;
                document.getElementById('verify-email-display').textContent = email;
                document.querySelectorAll('.form').forEach(f => f.classList.remove('active'));
                document.getElementById('form-verify').classList.add('active');
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                showAlert('تم إرسال كود التحقق إلى بريدك الإلكتروني', 'success');
            } catch (e) {
                showAlert('تعذّر الاتصال بالسيرفر');
            } finally {
                setLoading('btn-register', false);
            }
        }

        async function doVerify() {
            hideAlert();
            const code = document.getElementById('v-code').value.trim();
            if (!code || code.length !== 6) {
                return showAlert('يرجى إدخال الكود المكون من 6 أرقام');
            }
            setLoading('btn-verify', true);
            try {
                const res = await fetch(`${API}/auth/verify-email`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: pendingEmail, code }),
                });
                const data = await res.json();
                if (!res.ok) {
                    showAlert(data.message || 'كود غير صحيح');
                    return;
                }
                saveSession(data.token, data.data);
                showAlert('تم التحقق بنجاح، جاري التحويل...', 'success');
                setTimeout(() => { window.location.href = 'index.html'; }, 800);
            } catch (e) {
                showAlert('تعذّر الاتصال بالسيرفر');
            } finally {
                setLoading('btn-verify', false);
            }
        }

        // Enter key support
        document.addEventListener('keydown', (e) => {
            if (e.key !== 'Enter') return;
            const activeForm = document.querySelector('.form.active') ?.id;
            if (activeForm === 'form-login') doLogin();
            if (activeForm === 'form-register') doRegister();
            if (activeForm === 'form-verify') doVerify();
        });
    </script>
</body>

</html>
